<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Quiniela</title>
<style>
  :root{
    --navy:#0a1a3a; --navy-2:#132a5c; --gold:#d4af37; --gold-light:#f3d97a;
  }
  *{box-sizing:border-box;}
  html, body{overflow-x:hidden;}
  body{
    margin:0; font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,var(--navy) 0%,#04102a 100%);
    color:#fff; min-height:100vh; padding:16px;
  }
  .wrap{max-width:560px; margin:0 auto;}
  header{
    text-align:center; padding:18px 10px; border:2px solid var(--gold);
    border-radius:14px; background:linear-gradient(180deg,#0d234f,#081a3d);
    margin-bottom:16px; box-shadow:0 0 20px rgba(212,175,55,.25);
  }
  header h1{margin:0 0 4px; color:var(--gold-light); font-size:1.4rem;}
  header p{margin:0; color:#c9d3e8; font-size:.85rem;}
  .panel{
    background:#0d234f; border:1px solid #24407a; border-radius:10px;
    padding:16px; font-size:.9rem;
  }
  label{display:block; margin:14px 0 6px; color:var(--gold-light); font-weight:600; font-size:.85rem;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=password], input[type=number], select{
    width:100%; background:#0a1a3a; border:1px solid #345; color:#fff; border-radius:6px;
    padding:8px; font-size:.9rem;
  }
  .players{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .hint{color:#8fa0c8; font-size:.75rem; margin-top:6px; line-height:1.4;}
  button{
    width:100%; margin-top:20px;
    background:var(--gold); color:#1a1a1a; border:none; border-radius:6px;
    padding:11px 14px; font-weight:700; cursor:pointer; font-size:.95rem;
  }
  button:hover{background:var(--gold-light);}
  button:disabled{opacity:.6; cursor:default;}
  .status{margin-top:12px; font-size:.85rem; color:#9fd3a3;}
  .status.err{color:#ff9b9b;}
  a.back{display:inline-block; margin-top:16px; color:#8fa0c8; font-size:.8rem;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⭐ Nueva Quiniela</h1>
    <p>Crea una quiniela para tu grupo desde cualquier etapa del torneo</p>
  </header>

  <div class="panel">
    <form id="createForm">
      <label for="gameName">Nombre de la quiniela</label>
      <input type="text" id="gameName" placeholder="Familia López" required maxlength="60">

      <label for="creatorName">Tu nombre</label>
      <input type="text" id="creatorName" placeholder="¿Quién está creando esta quiniela?" required maxlength="40">

      <label for="tournament">Torneo</label>
      <select id="tournament">
        <option value="WC2026">Mundial 2026</option>
      </select>

      <label for="stage">Etapa en la que empieza</label>
      <select id="stage">
        <option value="GROUP_STAGE">Fase de grupos</option>
        <option value="LAST_32">Dieciseisavos (1/16)</option>
        <option value="LAST_16">Octavos de final (1/8)</option>
        <option value="QUARTER_FINALS" selected>Cuartos de final</option>
        <option value="SEMI_FINALS">Semifinales</option>
        <option value="FINAL">Final</option>
      </select>

      <label for="playerCount">Número de jugadores</label>
      <input type="number" id="playerCount" min="2" max="48" value="4">

      <label>Nombres de los jugadores</label>
      <div class="players" id="playerInputs"></div>
      <p class="hint">A cada jugador se le asignará un equipo al azar entre los que sigan vivos en esa etapa.</p>

      <label for="adminPassword">Contraseña de administrador</label>
      <input type="password" id="adminPassword" placeholder="Para poder hacer ajustes manuales luego" required minlength="4">
      <p class="hint">Guárdala — la necesitarás si algún resultado no se detecta bien y quieres corregirlo a mano.</p>

      <button type="submit" id="submitBtn">Crear quiniela</button>
      <div class="status" id="statusMsg"></div>
    </form>
    <a class="back" href="/">← Volver a la quiniela principal</a>
  </div>
</div>

<script>
const playerCountInput = document.getElementById('playerCount');
const playerInputsDiv = document.getElementById('playerInputs');

function renderPlayerInputs(){
  const n = Math.max(2, Math.min(48, Number(playerCountInput.value) || 0));
  const existing = [...playerInputsDiv.querySelectorAll('input')].map(i => i.value);
  playerInputsDiv.innerHTML = '';
  for (let i = 0; i < n; i++){
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = `Jugador ${i+1}`;
    input.maxLength = 40;
    input.value = existing[i] || '';
    input.required = true;
    playerInputsDiv.appendChild(input);
  }
}
playerCountInput.addEventListener('input', renderPlayerInputs);
renderPlayerInputs();

const form = document.getElementById('createForm');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');

function showStatus(msg, isErr){
  statusMsg.textContent = msg;
  statusMsg.className = 'status' + (isErr ? ' err' : '');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const players = [...playerInputsDiv.querySelectorAll('input')].map(i => i.value.trim());
  if (players.some(p => !p)){
    showStatus('Todos los jugadores necesitan un nombre.', true);
    return;
  }

  const payload = {
    gameName: document.getElementById('gameName').value.trim(),
    creatorName: document.getElementById('creatorName').value.trim(),
    tournament: document.getElementById('tournament').value,
    stage: document.getElementById('stage').value,
    players,
    adminPassword: document.getElementById('adminPassword').value,
  };

  submitBtn.disabled = true;
  showStatus('Creando quiniela...', false);
  try {
    const res = await fetch('/.netlify/functions/games-create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al crear la quiniela');
    window.location.href = `/g/${data.slug}`;
  } catch (err) {
    showStatus(err.message, true);
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
