<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de administración</title>
<style>
  :root{
    --navy:#0a1a3a; --navy-2:#132a5c; --gold:#d4af37; --gold-light:#f3d97a;
  }
  *{box-sizing:border-box;}
  html, body{overflow-x:hidden;}
  body{
    margin:0; font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(160deg,var(--navy) 0%,#04102a 100%);
    color:#fff; min-height:100vh; padding:16px;
  }
  .wrap{max-width:900px; margin:0 auto;}
  header{
    text-align:center; padding:18px 10px; border:2px solid var(--gold);
    border-radius:14px; background:linear-gradient(180deg,#0d234f,#081a3d);
    margin-bottom:16px; box-shadow:0 0 20px rgba(212,175,55,.25);
  }
  header h1{margin:0 0 4px; color:var(--gold-light); font-size:1.4rem;}
  header p{margin:0; color:#c9d3e8; font-size:.85rem;}
  .panel{
    background:#0d234f; border:1px solid #24407a; border-radius:10px;
    padding:16px; font-size:.9rem; margin-bottom:14px;
  }
  input[type=password], input[type=text], select{
    background:#0a1a3a; border:1px solid #345; color:#fff; border-radius:6px;
    padding:8px; font-size:.85rem; font-family:inherit;
  }
  button{
    background:var(--gold); color:#1a1a1a; border:none; border-radius:6px;
    padding:8px 14px; font-weight:700; cursor:pointer; font-size:.9rem;
  }
  button:hover{background:var(--gold-light);}
  button.small{padding:4px 10px; font-size:.75rem;}
  button.secondary{background:#24407a; color:#fff;}
  button.danger{background:#7a2b2b; color:#fff;}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .status{margin-top:10px; font-size:.85rem; color:#9fd3a3;}
  .status.err{color:#ff9b9b;}

  .game-card{background:#0d234f; border:1px solid #24407a; border-radius:10px; padding:12px 14px; margin-bottom:10px;}
  .game-card .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
  .game-card .name a{color:var(--gold-light); font-weight:700; font-size:1rem; text-decoration:none;}
  .game-card .name a:hover{text-decoration:underline;}
  .game-card dl{display:grid; grid-template-columns:auto 1fr; gap:2px 10px; font-size:.8rem; color:#c9d3e8; margin:8px 0 0;}
  .game-card dt{color:#8fa0c8;}
  .game-card dd{margin:0;}

  .edit-panel{background:#04102a; border:1px solid #24407a; border-radius:8px; padding:12px; margin-top:10px;}
  .edit-panel label{display:block; margin:8px 0 4px; color:var(--gold-light); font-size:.75rem; font-weight:600;}
  .edit-panel label:first-child{margin-top:0;}
  .edit-panel input[type=text], .edit-panel select{width:100%;}
  .edit-panel .hint{color:#8fa0c8; font-size:.72rem; margin-top:4px; line-height:1.4;}
  .player-row{display:flex; gap:6px; align-items:center; margin-top:6px;}
  .player-row input[type=text]{flex:1 1 40%; min-width:0;}
  .player-row select{flex:1 1 50%; min-width:0;}
  .player-row button{flex:0 0 auto; padding:6px 9px;}

  @media (max-width:640px){
    .game-card dl{grid-template-columns:1fr;}
    .game-card dt{margin-top:4px;}
    .player-row{flex-wrap:wrap;}
    .player-row input[type=text], .player-row select{flex:1 1 100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛠️ Panel de administración</h1>
    <p>Todas las quinielas creadas en el sitio</p>
  </header>

  <div class="panel" id="lockPanel">
    <div class="row">
      <input type="password" id="adminPassword" placeholder="Contraseña de administrador del sitio">
      <button id="unlockBtn">Ver quinielas</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>

  <div id="gamesList" style="display:none;"></div>
</div>

<script>
const STORAGE_KEY = 'quiniela_site_admin_password';
const STAGE_LABELS = {
  GROUP_STAGE: 'Fase de grupos', LAST_32: 'Dieciseisavos', LAST_16: 'Octavos de final',
  QUARTER_FINALS: 'Cuartos de final', SEMI_FINALS: 'Semifinales', FINAL: 'Final',
};
const STAGE_OPTIONS = ['GROUP_STAGE','LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','FINAL'];
const TOURNAMENTS = {
  WC2026: { type: 'KNOCKOUT' },
  PL: { type: 'LEAGUE' },
};
let sitePassword = null;
let lastGames = [];
const poolCache = {}; // idx -> pool array for the currently loaded stage in that edit panel

function tournamentTypeFor(idx){
  const g = lastGames[idx];
  return (TOURNAMENTS[g.tournament] || {}).type;
}

function periodLabel(tournamentType, period){
  return tournamentType === 'LEAGUE' ? `Jornada ${period}` : (STAGE_LABELS[period] || period);
}

function showStatus(msg, isErr){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

function stageOptionsHtml(selected){
  return STAGE_OPTIONS.map(s => `<option value="${s}" ${s===selected?'selected':''}>${STAGE_LABELS[s]}</option>`).join('');
}

function getStageValue(idx){
  return tournamentTypeFor(idx) === 'LEAGUE'
    ? document.getElementById(`editStageLeague-${idx}`).value
    : document.getElementById(`editStageKnockout-${idx}`).value;
}

function setStageValue(idx, value){
  if (tournamentTypeFor(idx) === 'LEAGUE'){
    document.getElementById(`editStageLeague-${idx}`).value = value;
  } else {
    document.getElementById(`editStageKnockout-${idx}`).value = value;
  }
}

function teamOptionsHtml(pool, selectedTeamId){
  const auto = `<option value="" ${!selectedTeamId?'selected':''}>Auto (aleatorio)</option>`;
  const opts = pool.map(t => `<option value="${t.id}" ${String(t.id)===String(selectedTeamId)?'selected':''}>${t.name}</option>`).join('');
  return auto + opts;
}

function playerRowHtml(idx, rowIdx, name, teamId, pool){
  return `
    <div class="player-row" data-row="${rowIdx}">
      <input type="text" placeholder="Nombre del jugador" value="${name || ''}" data-role="name">
      <select data-role="team">${teamOptionsHtml(pool, teamId)}</select>
      <button type="button" class="small danger" data-remove-row="${rowIdx}">✕</button>
    </div>
  `;
}

function renderGames(games){
  lastGames = games;
  document.getElementById('gamesList').innerHTML = games.map((g, idx) => {
    const type = (TOURNAMENTS[g.tournament] || {}).type;
    const isLeague = type === 'LEAGUE';
    return `
    <div class="game-card">
      <div class="top">
        <div class="name"><a href="/g/${g.slug}" target="_blank">${g.gameName}</a></div>
        <button class="small secondary" data-idx="${idx}">Editar</button>
      </div>
      <dl>
        <dt>Creador</dt><dd>${g.creatorName}</dd>
        <dt>Torneo</dt><dd>${g.tournament}</dd>
        <dt>Etapa</dt><dd>${periodLabel(type, g.stage)}</dd>
        <dt>Jugadores</dt><dd>${g.assignedCount} / ${g.totalSlots}</dd>
        <dt>Creado</dt><dd>${new Date(g.createdAt).toLocaleString('es-MX')}</dd>
      </dl>
      <div id="editRow-${idx}" style="display:none;">
        <div class="edit-panel">
          <label>Nombre de la quiniela</label>
          <input type="text" id="editGameName-${idx}">
          <label>Nombre del creador</label>
          <input type="text" id="editCreatorName-${idx}">
          <div id="editStageKnockoutWrap-${idx}" style="display:${isLeague ? 'none' : 'block'};">
            <label>Etapa</label>
            <select id="editStageKnockout-${idx}">${stageOptionsHtml(g.stage)}</select>
          </div>
          <div id="editStageLeagueWrap-${idx}" style="display:${isLeague ? 'block' : 'none'};">
            <label>Jornada</label>
            <input type="number" id="editStageLeague-${idx}" min="1" max="38" value="${isLeague ? g.stage : 1}">
          </div>
          <label>Jugadores y equipos</label>
          <div id="playerRows-${idx}"></div>
          <div class="row" style="margin-top:8px;">
            <button type="button" class="small secondary" data-add-row="${idx}">+ Agregar jugador</button>
          </div>
          <p class="hint">"Auto" reparte un equipo al azar entre los que queden disponibles en esa etapa. Elegir un equipo específico lo fija para ese jugador; los equipos no elegidos por nadie quedan como "Sin Asignar".</p>
          <div class="row" style="margin-top:10px;">
            <button class="small" data-save="${idx}">Guardar cambios</button>
            <button class="small secondary" data-cancel="${idx}">Cancelar</button>
            <button type="button" class="small danger" data-delete="${idx}" style="margin-left:auto;">🗑️ Eliminar quiniela</button>
          </div>
          <div class="status" id="editStatus-${idx}"></div>
        </div>
      </div>
    </div>
  `;
  }).join('') || '<p>No hay quinielas creadas todavía.</p>';

  document.querySelectorAll('button[data-idx]').forEach(btn => {
    btn.addEventListener('click', () => openEditPanel(Number(btn.dataset.idx)));
  });
  document.querySelectorAll('button[data-cancel]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(`editRow-${btn.dataset.cancel}`).style.display = 'none';
    });
  });
  document.querySelectorAll('button[data-save]').forEach(btn => {
    btn.addEventListener('click', () => saveGame(Number(btn.dataset.save)));
  });
  document.querySelectorAll('button[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteGameConfirm(Number(btn.dataset.delete)));
  });
}

async function deleteGameConfirm(idx){
  const g = lastGames[idx];
  const ok = window.confirm(`¿Eliminar "${g.gameName}" permanentemente? Esto no se puede deshacer.`);
  if (!ok) return;

  const statusEl = document.getElementById(`editStatus-${idx}`);
  statusEl.textContent = 'Eliminando...';
  statusEl.className = 'status';

  try {
    const res = await fetch('/.netlify/functions/games-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: g.slug, sitePassword }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al eliminar');
    await loadGames(sitePassword);
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status err';
  }
}

async function fetchPool(idx, stage){
  const g = lastGames[idx];
  const statusEl = document.getElementById(`editStatus-${idx}`);
  try {
    const res = await fetch('/.netlify/functions/games-teams', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tournament: g.tournament, stage }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'No se pudieron cargar los equipos disponibles');
    poolCache[idx] = data.pool;
    if (String(data.resolvedStage) !== String(stage)){
      setStageValue(idx, data.resolvedStage);
      statusEl.textContent = `Esa etapa ya concluyó, se ajustó a ${periodLabel(tournamentTypeFor(idx), data.resolvedStage)}.`;
      statusEl.className = 'status err';
    }
  } catch (err) {
    poolCache[idx] = [];
    statusEl.textContent = err.message;
    statusEl.className = 'status err';
  }
  return poolCache[idx];
}

function renderPlayerRows(idx, entries){
  const pool = poolCache[idx] || [];
  const container = document.getElementById(`playerRows-${idx}`);
  container.innerHTML = entries.map((e, rowIdx) => playerRowHtml(idx, rowIdx, e.name, e.teamId, pool)).join('');
  wirePlayerRowRemovers(idx);
}

function wirePlayerRowRemovers(idx){
  document.querySelectorAll(`#playerRows-${idx} button[data-remove-row]`).forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.player-row').remove();
    });
  });
}

async function openEditPanel(idx){
  const g = lastGames[idx];
  const row = document.getElementById(`editRow-${idx}`);
  const isOpen = row.style.display !== 'none';
  if (isOpen){ row.style.display = 'none'; return; }
  row.style.display = 'block';

  document.getElementById(`editGameName-${idx}`).value = g.gameName;
  document.getElementById(`editCreatorName-${idx}`).value = g.creatorName;
  setStageValue(idx, g.stage);
  const stageField = tournamentTypeFor(idx) === 'LEAGUE'
    ? document.getElementById(`editStageLeague-${idx}`)
    : document.getElementById(`editStageKnockout-${idx}`);

  const statusEl = document.getElementById(`editStatus-${idx}`);
  statusEl.textContent = 'Cargando equipos disponibles...';
  statusEl.className = 'status';
  await fetchPool(idx, getStageValue(idx));
  statusEl.textContent = '';

  const namedPlayers = g.players.filter(p => p.name).map(p => ({ name: p.name, teamId: p.teamId }));
  renderPlayerRows(idx, namedPlayers.length ? namedPlayers : [{ name: '', teamId: null }]);

  stageField.onchange = async () => {
    statusEl.textContent = 'Cargando equipos disponibles...';
    statusEl.className = 'status';
    await fetchPool(idx, getStageValue(idx));
    statusEl.textContent = 'Etapa cambiada: revisa los equipos asignados abajo.';
    // Re-render existing rows against the new pool; team IDs that no longer
    // exist in this stage's pool will just fall back to "Auto".
    const rows = [...document.querySelectorAll(`#playerRows-${idx} .player-row`)].map(r => ({
      name: r.querySelector('[data-role=name]').value,
      teamId: r.querySelector('[data-role=team]').value || null,
    }));
    renderPlayerRows(idx, rows);
  };

  document.querySelector(`button[data-add-row="${idx}"]`).onclick = () => {
    const container = document.getElementById(`playerRows-${idx}`);
    const rowIdx = container.querySelectorAll('.player-row').length;
    container.insertAdjacentHTML('beforeend', playerRowHtml(idx, rowIdx, '', null, poolCache[idx] || []));
    wirePlayerRowRemovers(idx);
  };
}

async function saveGame(idx){
  const g = lastGames[idx];
  const statusEl = document.getElementById(`editStatus-${idx}`);
  statusEl.textContent = 'Guardando...';
  statusEl.className = 'status';

  const players = [...document.querySelectorAll(`#playerRows-${idx} .player-row`)]
    .map(r => ({
      name: r.querySelector('[data-role=name]').value.trim(),
      teamId: r.querySelector('[data-role=team]').value || null,
    }))
    .filter(p => p.name);

  if (players.length < 2){
    statusEl.textContent = 'Se necesitan al menos 2 jugadores con nombre.';
    statusEl.className = 'status err';
    return;
  }

  const payload = {
    slug: g.slug,
    sitePassword,
    gameName: document.getElementById(`editGameName-${idx}`).value.trim(),
    creatorName: document.getElementById(`editCreatorName-${idx}`).value.trim(),
    tournament: g.tournament,
    stage: getStageValue(idx),
    players,
  };

  try {
    const res = await fetch('/.netlify/functions/games-admin-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.status === 409 && data.suggestedStage){
      setStageValue(idx, data.suggestedStage);
      statusEl.textContent = `${data.error} Ya ajusté la etapa — presiona "Guardar cambios" de nuevo.`;
      statusEl.className = 'status err';
      return;
    }
    if (!res.ok) throw new Error(data.error || 'Error al guardar');
    await loadGames(sitePassword);
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status err';
  }
}

async function loadGames(password){
  showStatus('Cargando...', false);
  try {
    const res = await fetch('/.netlify/functions/games-list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al cargar la lista');

    sitePassword = password;
    sessionStorage.setItem(STORAGE_KEY, password);
    document.getElementById('lockPanel').style.display = 'none';
    document.getElementById('gamesList').style.display = 'block';
    renderGames(data.games);
    showStatus('', false);
  } catch (err) {
    showStatus(err.message, true);
  }
}

document.getElementById('unlockBtn').addEventListener('click', () => {
  const password = document.getElementById('adminPassword').value;
  loadGames(password);
});

(function init(){
  const stored = sessionStorage.getItem(STORAGE_KEY);
  if (stored) loadGames(stored);
})();
</script>
</body>
</html>
